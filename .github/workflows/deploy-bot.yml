# =============================================
# CodeCraft Gen-Z - Deploy Discord Bot
# =============================================
# Trigger: push para main com mudancas em discord-bot/
# =============================================

name: Deploy Discord Bot

on:
  push:
    branches: [main]
    paths:
      - 'discord-bot/**'

jobs:
  # =============================================
  # Deploy via SSH no VPS
  # =============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/codecraft-backend
            git pull origin main
            cd discord-bot
            npm ci
            npm run build
            pm2 restart codecraft-bot --update-env
            echo "Discord bot deploy concluido com sucesso."

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Deploy Discord Bot - codecraft-bot"
          description: "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
          username: "GitHub Actions"

# Secrets necessarios (configurar em Settings > Secrets > Actions do repo):
#   VPS_HOST             — IP do VPS (187.77.229.205)
#   VPS_USER             — Usuario SSH (root)
#   VPS_SSH_KEY          — Chave privada SSH (conteudo do arquivo ~/.ssh/id_rsa ou similar)
#   DISCORD_WEBHOOK_URL  — Webhook URL do canal de notificacoes do Discord
