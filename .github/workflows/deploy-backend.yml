# =============================================
# CodeCraft Gen-Z - Deploy Backend
# =============================================
# Trigger: push para main com mudancas em backend/
# =============================================

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  # =============================================
  # Deploy via SSH no VPS
  # =============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -ex
            cd /var/www/codecraft-backend
            git pull origin main
            chown -R codecraft:codecraft .
            # Sub-shells separados pra cada etapa: se quebrar, sabemos onde.
            # sudo -u ... -i e mais previsivel que runuser em SSH nao-interativo.
            sudo -u codecraft -i bash -c 'cd /var/www/codecraft-backend/backend && npm ci'
            sudo -u codecraft -i bash -c 'cd /var/www/codecraft-backend/backend && npm run build'
            sudo -u codecraft -i bash -c 'pm2 restart codecraft-backend --update-env'
            echo "Backend deploy concluido com sucesso."

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "Deploy Backend - api.codecraftgenz.com.br"
          description: "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
          username: "GitHub Actions"

# Secrets necessarios (configurar em Settings > Secrets > Actions do repo):
#   VPS_HOST             — IP do VPS (187.77.229.205)
#   VPS_USER             — Usuario SSH (root)
#   VPS_SSH_KEY          — Chave privada SSH (conteudo do arquivo ~/.ssh/id_rsa ou similar)
#   DISCORD_WEBHOOK_URL  — Webhook URL do canal de notificacoes do Discord
